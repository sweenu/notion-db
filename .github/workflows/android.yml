name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build-tools
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" || true

      - name: Unit tests (parsing, write-back shapes, Glance render)
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --stacktrace --no-configuration-cache

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-configuration-cache

      - name: Name the APK with the commit
        run: cp app/build/outputs/apk/debug/app-debug.apk "notion-db-${GITHUB_SHA::7}.apk"

      - name: Upload installable APK (one per commit)
        uses: actions/upload-artifact@v4
        with:
          name: notion-db-apk-${{ github.sha }}
          path: notion-db-*.apk
          if-no-files-found: error
